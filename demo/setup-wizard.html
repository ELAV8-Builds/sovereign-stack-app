<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sovereign Stack - Setup Wizard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-white">
  <div class="container mx-auto px-4 py-8">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold mb-2">Sovereign Stack Setup</h1>
      <p class="text-slate-400">Pre-Flight Checks (10% complete)</p>
    </div>

    <!-- Progress Bar -->
    <div class="max-w-2xl mx-auto mb-8">
      <div class="bg-slate-700 rounded-full h-4 overflow-hidden">
        <div class="bg-gradient-to-r from-blue-500 to-purple-600 h-full" style="width: 10%"></div>
      </div>
    </div>

    <!-- Main Content Card -->
    <div class="max-w-3xl mx-auto bg-slate-800 rounded-lg shadow-xl p-8">
      <div class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <div class="bg-slate-700 p-4 rounded">
            <div class="text-sm text-slate-400">macOS Version</div>
            <div class="text-lg font-semibold">14.2.1</div>
          </div>
          <div class="bg-slate-700 p-4 rounded">
            <div class="text-sm text-slate-400">Architecture</div>
            <div class="text-lg font-semibold">arm64</div>
          </div>
          <div class="bg-slate-700 p-4 rounded">
            <div class="text-sm text-slate-400">Available Disk Space</div>
            <div class="text-lg font-semibold">127.3 GB</div>
          </div>
          <div class="bg-slate-700 p-4 rounded">
            <div class="text-sm text-slate-400">Current User</div>
            <div class="text-lg font-semibold">admin</div>
          </div>
        </div>

        <div class="bg-green-900/20 border border-green-600 rounded p-4">
          <div class="font-semibold">✅ System meets requirements</div>
          <p class="text-sm text-slate-400 mt-2">
            Your Mac is ready for the Sovereign Stack installation.
          </p>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="flex justify-between mt-8">
        <button class="px-6 py-2 bg-slate-700 hover:bg-slate-600 rounded font-medium transition">
          Cancel
        </button>
        <button class="px-6 py-2 bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 rounded font-medium transition">
          Continue
        </button>
      </div>
    </div>
  </div>
</body>
</html>
